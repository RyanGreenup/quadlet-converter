version: "3.7"

services:
  caddy:
    # Podman requires fully qualified domain names when running non-interactively (like in systemd)
    image: docker.io/library/caddy:latest

    # Security hardening
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    # network_mode: "host"
    # podlet generates a systemd unit with Restart=on-failure by default
    # restart: unless-stopped
    ports:
      - "80:80"
      - 127.0.0.1:8081:8081
      - "443:443"
      - "443:443/udp"
    volumes:
      # Config - read-only bind mount (edit on host, container can't modify)
      - ./data/etc/caddy:/etc/caddy:ro,z

      # Static files - read-only (container serves but can't modify)
      - ./data/srv:/srv:ro,z
      - ./data/public:/public:ro,z

      # Caddy-managed data - named volumes (isolated, Caddy writes TLS certs here)
      - caddy_data:/data
      - caddy_config:/config

      # tmpfs for read-only rootfs (Caddy needs writable /tmp)
      - type: tmpfs
        target: /tmp

      # External docs - read-only
      - /mnt/volume_syd1_05/Applications/gforce_docs/book:/docs:ro,z
      - /mnt/volume_syd1_05/Applications/slint-ui_docs/book:/slint_ui_docs:ro,z

volumes:
  caddy_data:
  caddy_config:

