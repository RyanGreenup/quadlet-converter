# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
# podman-compose
name: caddy
services:
  my-caddy:
    image: caddy:2
    restart: unless-stopped
    network_mode: host
    environment:
      XDG_DATA_HOME: /caddy_storage/data
      XDG_CONFIG_HOME: /caddy_storage/config
      CADDYFILE_PATH: /caddy_storage/Caddyfile
    volumes:
      - caddy_storage:/caddy_storage
    command:
      ["caddy", "run", "--config", "$CADDYFILE_PATH", "--adapter", "caddyfile"]
    # Hardening
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - label=type:container_runtime_t

volumes:
  caddy_storage:
