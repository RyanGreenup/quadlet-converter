services:

###############################################################################
# ClickHouse ##################################################################
###############################################################################

#  Clickhouse Image ............................................................

  clickhouse:
    image: clickhouse
    # Docker hard cap; ClickHouse internal limit is 3GB in ./data/configs/low-memory.xml ./data/configs/low-memory-users.xml (4cfef5c)
    mem_limit: 4g
    ulimits:
      nofile:
        hard: 262144
        soft: 262144
    container_name: some-clickhouse-server
    environment:
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT}
      - PGDATABASE=${PGDATABASE}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - PGSSLCERT=/tmp/postgresql.crt
    ports:
      - "127.0.0.1:${CLICKHOUSE_PORT}:9000"  # NATIVE
      - "127.0.0.1:18123:8123"  # HTTP
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse:Z
      # Grant named_collection_control to default user
      - ./data/configs/users-override.xml:/etc/clickhouse-server/users.d/named-collection-grant.xml:Z
      # Low-memory tuning (server-level and per-query profile)
      - ./data/configs/low-memory.xml:/etc/clickhouse-server/config.d/low-memory.xml:Z
      - ./data/configs/low-memory-users.xml:/etc/clickhouse-server/users.d/low-memory.xml:Z
    restart: unless-stopped

#  UI Image ...................................................................

  # NOTE: I had to spin this up twice before it worked, so up, down, up again
  ch-ui:
    image: ghcr.io/caioricciuti/ch-ui:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5521:5521"
    # environment:
    #   # Note, This must be the location for the client (as JS is client side)
    #   VITE_CLICKHOUSE_URL: "http://localhost:18123"
    #   VITE_CLICKHOUSE_USER: "user"
    #   VITE_CLICKHOUSE_PASS: "sadflkjdslkfj3298"

###############################################################################
# Visualization and Dashboards ################################################
###############################################################################

#  Grafana ....................................................................

  grafana:
  # Password is admin/admin
  # Extension is
  # http://localhost:32679/connections/datasources/grafana-clickhouse-datasource
    image: grafana/grafana
    ports:
        - '127.0.0.1:32679:3000'
    volumes:
        - grafana-storage:/var/lib/grafana/
    environment:
        - GF_PATHS_CONFIG=/etc/grafana/grafana.ini
        - GF_PATHS_DATA=/var/lib/grafana
        - GF_PATHS_HOME=/usr/share/grafana
        - GF_PATHS_LOGS=/var/log/grafana
        - GF_PATHS_PLUGINS=/var/lib/grafana/plugins
        - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    # After docker makes everything, run `sudo chown -R "472:0" ./data`
    # cofirm with docker compose exec -it grafana id -u; id -g
    user: "472"  # This is the default Grafana user in the container

