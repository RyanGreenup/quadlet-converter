services:
  web:
    image: myapp:latest
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
    secrets:
      - db_password
      - api_key
      - source: tls_cert
        target: /run/secrets/server.crt
        uid: "1000"
        gid: "1000"
        mode: "0440"

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_DB: myapp
    secrets:
      - db_password
      - source: db_init_sql
        target: /docker-entrypoint-initdb.d/init.sql

secrets:
  db_password:
    file: ./secrets/db_password.txt
  api_key:
    environment: API_KEY
  tls_cert:
    file: ./secrets/server.crt
  db_init_sql:
    file: ./secrets/init.sql
  session_key:
    external: true

volumes:
  pgdata:
