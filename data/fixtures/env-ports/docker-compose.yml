services:
  web:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    environment:
      - BACKEND_URL=http://app:${APP_PORT}

  app:
    image: node:22-alpine
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      - db
      - redis
    environment:
      - PORT=${APP_PORT}
      - DATABASE_URL=postgresql://user:pass@db:${DB_PORT}/mydb
      - REDIS_URL=redis://redis:${REDIS_PORT}/0

  db:
    image: postgres:17-alpine
    ports:
      - "${DB_PORT}:5432"
    environment:
      - POSTGRES_PASSWORD=secret

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"

  metrics:
    image: prom/prometheus:latest
    ports:
      - "${METRICS_PORT}:9090"
