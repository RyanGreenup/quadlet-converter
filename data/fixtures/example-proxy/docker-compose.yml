version: "3.8"

x-common-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-common-security: &security
  security_opt:
    - no-new-privileges:true
  read_only: true
  cap_drop:
    - ALL

services:
  traefik:
    image: docker.io/library/traefik:3.2
    container_name: traefik
    restart: unless-stopped
    <<: *security
    cap_add:
      - NET_BIND_SERVICE
    logging: *logging

    # --- Resource constraints (podlet won't map these) ---
    mem_limit: 256m
    mem_reservation: 128m
    memswap_limit: 512m
    cpus: 0.5
    cpuset: "0,1"
    pids_limit: 256
    oom_score_adj: -500

    # --- Healthcheck (podlet handles these) ---
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s

    ports:
      - "443:443"
      - "80:80"
    volumes:
      - /run/podman/podman.sock:/var/run/docker.sock:ro,Z
      - traefik-certs:/etc/traefik/acme:Z
      - ./traefik.yml:/etc/traefik/traefik.yml:ro,Z
      - ./dynamic:/etc/traefik/dynamic:ro,Z
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    networks:
      - proxy
      - monitoring
    environment:
      - TZ=Australia/Melbourne
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.example.com`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth@file"
    sysctls:
      net.core.somaxconn: 4096
      net.ipv4.ip_local_port_range: "1024 65535"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 4096

  app:
    image: docker.io/myorg/myapp:1.4.2
    container_name: app
    restart: unless-stopped
    <<: *security
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    # --- Resource constraints ---
    mem_limit: 512m
    mem_reservation: 256m
    memswap_limit: 1g
    cpus: 1.5
    cpuset: "2,3,4,5"
    pids_limit: 512
    oom_score_adj: -300

    # --- Lifecycle hooks (podlet can't map these) ---
    post_start:
      - command: /app/bin/migrate
    pre_stop:
      - command: /app/bin/drain-connections

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 45s
      start_interval: 5s

    expose:
      - "8080"
    volumes:
      - app-data:/app/data:Z
      - app-tmp:/app/tmp:Z
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    networks:
      - proxy
      - backend
    environment:
      - DATABASE_URL=postgresql://app:secret@postgres:5432/myapp?sslmode=require
      - REDIS_URL=redis://redis:6379/0
      - RUST_LOG=info
      - TZ=Australia/Melbourne
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.example.com`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=8080"
      - "traefik.http.routers.app.middlewares=security-headers@file,rate-limit@file"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    <<: *security
    cap_add:
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - FOWNER
      - CHOWN
    logging: *logging
    shm_size: 256m

    # --- Resource constraints ---
    mem_limit: 1g
    mem_reservation: 512m
    memswap_limit: 2g
    cpus: 2.0
    cpuset: "2,3,4,5"
    pids_limit: 256
    oom_score_adj: -900

    # --- Lifecycle hooks ---
    pre_stop:
      - command: su-exec postgres pg_ctl stop -m fast

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d myapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
      start_interval: 5s

    volumes:
      - postgres-data:/var/lib/postgresql/data:Z
      - ./initdb:/docker-entrypoint-initdb.d:ro,Z
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
      - /run/postgresql:size=64m
    networks:
      - backend
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_DB=myapp
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=Australia/Melbourne
    secrets:
      - db_password
    sysctls:
      net.core.somaxconn: 1024
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: redis
    restart: unless-stopped
    <<: *security
    logging: *logging

    # --- Resource constraints ---
    mem_limit: 256m
    mem_reservation: 128m
    memswap_limit: 256m
    mem_swappiness: 0
    cpus: 0.5
    pids_limit: 128
    oom_score_adj: -700

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
      start_interval: 3s

    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --protected-mode yes
      --bind 0.0.0.0
      --tcp-backlog 511
    volumes:
      - redis-data:/data:Z
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    networks:
      - backend
    environment:
      - TZ=Australia/Melbourne
    sysctls:
      net.core.somaxconn: 512

networks:
  proxy:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/24
  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.1.0/24
  monitoring:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24

volumes:
  traefik-certs:
  app-data:
  app-tmp:
  postgres-data:
  redis-data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
