name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run typecheck

      - run: bun test

      - name: Build all targets
        run: |
          bun install --os '*' --cpu '*'
          bunli build --targets linux-x64,linux-arm64,darwin-x64,darwin-arm64

      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stage binaries
        run: |
          for target in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp "dist/$target/index" "panlet-$target"
            chmod 755 "panlet-$target"
          done

      - name: Build .deb (amd64)
        run: packaging/build-deb.sh "${{ steps.version.outputs.version }}" amd64 linux-x64

      - name: Build .deb (arm64)
        run: packaging/build-deb.sh "${{ steps.version.outputs.version }}" arm64 linux-arm64

      - name: Build .rpm
        run: |
          sudo apt-get update && sudo apt-get install -y rpm
          packaging/build-rpm.sh "${{ steps.version.outputs.version }}" x86_64 linux-x64
          packaging/build-rpm.sh "${{ steps.version.outputs.version }}" aarch64 linux-arm64

      - name: Prepare PKGBUILD
        run: |
          cd packaging
          sed -i "s/pkgver=VERSION/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
          tar czf PKGBUILD.tar.gz PKGBUILD

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            panlet-linux-x64
            panlet-linux-arm64
            panlet-darwin-x64
            panlet-darwin-arm64
            panlet_*.deb
            *.rpm
            packaging/PKGBUILD.tar.gz
